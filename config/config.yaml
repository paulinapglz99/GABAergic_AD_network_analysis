# =============================================================================
# GABAergic AD Network Analysis — Configuration
# =============================================================================
# Ensembl IDs: GRCh38 stable IDs. No biomaRt dependency.

paths:
  networks_dir: "data/networks"
  topology_dir: "data/topology"
  enrichment_dir: "data/enrichment"
  gene_sets_dir: "data/gene_sets"
  results_dir: "results"
  figures_dir: "results/figures"
  tables_dir: "results/tables"

regions:
  - name: "DLPFC"
    cohort: "ROSMAP"
  - name: "HCN"
    cohort: "ROSMAP"
  - name: "PCC"
    cohort: "ROSMAP"
  - name: "TC"
    cohort: "Mayo"
  - name: "CRB"
    cohort: "Mayo"

conditions:
  - "AD"
  - "control"

gene_set:
  synthesis:
    GAD1: "ENSG00000128683"
    GAD2: "ENSG00000136750"
  transport:
    SLC6A1: "ENSG00000157103"
    SLC6A11: "ENSG00000132164"
    SLC6A13: "ENSG00000150995"
    SLC32A1: "ENSG00000101438"
  gabaa_receptors:
    GABRA1: "ENSG00000022355"
    GABRA2: "ENSG00000151834"
    GABRA3: "ENSG00000011677"
    GABRA4: "ENSG00000109158"
    GABRA5: "ENSG00000186297"
    GABRA6: "ENSG00000145863"
    GABRB1: "ENSG00000163288"
    GABRB2: "ENSG00000145864"
    GABRB3: "ENSG00000166206"
    GABRG1: "ENSG00000163285"
    GABRG2: "ENSG00000113327"
    GABRG3: "ENSG00000182256"
    GABRD: "ENSG00000187730"
    GABRE: "ENSG00000102287"
    GABRP: "ENSG00000094755"
    GABRQ: "ENSG00000268089"
  gabab_receptors:
    GABBR1: "ENSG00000204681"
    GABBR2: "ENSG00000136928"
  catabolism:
    ABAT: "ENSG00000183044"
    ALDH5A1: "ENSG00000112294"
  interneuron_markers:
    PVALB: "ENSG00000100362"
    SST: "ENSG00000157005"
    VIP: "ENSG00000146469"
    CCK: "ENSG00000187094"
    CALB1: "ENSG00000104327"
    CALB2: "ENSG00000172137"
    NPY: "ENSG00000122585"
  synapse_organizers:
    NLGN2: "ENSG00000169992"
    NLGN3: "ENSG00000196338"
    NRXN1: "ENSG00000179915"
    NRXN3: "ENSG00000021645"
    SLITRK3: "ENSG00000184731"
    GPHN: "ENSG00000171723"
    ARHGEF9: "ENSG00000131089"

analysis:
  n_permutations: 10000
  min_module_size: 10
  enrichment_padj_cutoff: 0.05
  top_n_terms: 3
  dc_metric: "degree"
  jaccard_threshold: 0.1

plotting:
  width: 10
  height: 7
  dpi: 300
  font_family: "sans"
  region_colors:
    DLPFC: "#E63946"
    HCN: "#457B9D"
    PCC: "#2A9D8F"
    TC: "#E9C46A"
    CRB: "#264653"
  condition_colors:
    AD: "#D62828"
    control: "#023047"
  subpathway_colors:
    synthesis: "#1B9E77"
    transport: "#D95F02"
    gabaa_receptors: "#7570B3"
    gabab_receptors: "#E7298A"
    catabolism: "#66A61E"
    interneuron_markers: "#E6AB02"
    synapse_organizers: "#A6761D"
